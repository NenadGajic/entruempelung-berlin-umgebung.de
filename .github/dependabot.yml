version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-safe:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: composer
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      php-safe:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
